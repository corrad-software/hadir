# Production reference stack for Coolify-style deployment.
# Coolify typically maps each service to its own resource; use this compose file
# for local production smoke tests or a single-host Docker deployment.
#
# Single-domain routing on hadir.sena.my (Coolify / Traefik):
#   /api/*      → api service
#   /sanctum/*  → api service
#   /*          → frontend service

name: hadir

x-api-env: &api-env
  APP_NAME: Hadir
  APP_ENV: production
  APP_DEBUG: "false"
  APP_URL: https://hadir.sena.my
  APP_KEY: ${APP_KEY:?Set APP_KEY in .env}
  FRONTEND_URL: https://hadir.sena.my
  SANCTUM_STATEFUL_DOMAINS: hadir.sena.my
  SESSION_DOMAIN: hadir.sena.my
  LOG_CHANNEL: stderr
  LOG_LEVEL: warning
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: "3306"
  DB_DATABASE: hadir
  DB_USERNAME: hadir
  DB_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD}
  SSO_DB_HOST: mysql
  SSO_DB_PORT: "3306"
  SSO_DB_DATABASE: hadir
  SSO_DB_USERNAME: hadir
  SSO_DB_PASSWORD: ${MYSQL_PASSWORD}
  ATTENDANCE_DB_HOST: postgres
  ATTENDANCE_DB_PORT: "5432"
  ATTENDANCE_DB_DATABASE: hadir_attendance
  ATTENDANCE_DB_USERNAME: hadir
  ATTENDANCE_DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
  SESSION_DRIVER: database
  QUEUE_CONNECTION: database
  CACHE_STORE: database
  FILESYSTEM_DISK: public
  BCRYPT_ROUNDS: "12"
  RUN_MIGRATIONS: "true"
  RUN_SEED: "false"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      <<: *api-env
    volumes:
      - api_storage:/var/www/html/storage/app
    ports:
      - "8000:80"
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    environment:
      <<: *api-env
      RUN_MIGRATIONS: "false"
    volumes:
      - api_storage:/var/www/html/storage/app
    depends_on:
      api:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    environment:
      <<: *api-env
      RUN_MIGRATIONS: "false"
    volumes:
      - api_storage:/var/www/html/storage/app
    depends_on:
      api:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: https://hadir.sena.my
    restart: unless-stopped
    ports:
      - "5180:80"
    depends_on:
      api:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: hadir
      MYSQL_USER: hadir
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hadir_attendance
      POSTGRES_USER: hadir
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hadir -d hadir_attendance"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mysql_data:
  postgres_data:
  api_storage:
